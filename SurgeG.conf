#⚠️⚠️⚠️⚠️⚠️⚠️重寫
[URL Rewrite]
^https?://(www.)?(g|google).cn https://www.google.com 302
[Header Rewrite]
http-request ^https:\/\/gql(-fed)?\.reddit\.com\/ header-del x-reddit-translations #!FROM-MODULE:Reddit 去广告
http-request ^https:\/\/gql(-fed)?\.reddit\.com\/ header-add x-reddit-translations "enabled, seo, zh-hans" #!FROM-MODULE:Reddit 去广告
[Body Rewrite]
# walk(
# if type == "object" then
# (if .isNsfw == true then .isNsfw = false else . end)
# | (if .isNsfwMediaBlocked == true then .isNsfwMediaBlocked = false else . end)
# | (if .isNsfwContentShown == false then .isNsfwContentShown = true else . end)
# | (if (.commentsPageAds | type == "array") then (.commentsPageAds = []) else . end)
# | (if ( (.node | type == "object") and (.node.cells | type == "array") and (.node.cells | any(.__typename? == "AdMetadataCell" or .isAdPost? == true)) ) then empty else . end)
# | (if (.node | type == "object") and (.node.adPayload | type == "object") then empty else . end)
# | (if .__typename == "AdPost" then empty else . end)
# else .
# end)
http-response-jq ^https?:\/\/gql(-fed)?\.reddit\.com 'walk( if type == "object" then (if .isNsfw == true then .isNsfw = false else . end) | (if .isNsfwMediaBlocked == true then .isNsfwMediaBlocked = false else . end) | (if .isNsfwContentShown == false then .isNsfwContentShown = true else . end) | (if (.commentsPageAds | type == "array") then (.commentsPageAds = []) else . end) | (if ( (.node | type == "object") and (.node.cells | type == "array") and (.node.cells | any(.__typename? == "AdMetadataCell" or .isAdPost? == true)) ) then empty else . end) | (if (.node | type == "object") and (.node.adPayload | type == "object") then empty else . end) | (if .__typename == "AdPost" then empty else . end) else . end)' #!FROM-MODULE:Reddit 去广告
