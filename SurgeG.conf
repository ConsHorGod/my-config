#⚠️⚠️⚠️⚠️⚠️⚠️中間人攻擊打斷
[MITM]
# 安全警告：務必保持false，確保SSL證書真實有效
skip-server-cert-verify = true
# 開啟 HTTP/2 協議支持，提升性能
h2 = true
# 不可MitM也不應該被打斷連接的域名，優先排除系統關鍵服務、流媒體、以及有 SSL Pinning 校驗的 App，域名匹配邏輯：先排除敏感域名(-)，最後留出位置給腳本注入(%INSERT%)
hostname = %INSERT% -*.facebook.com, -*.instagram.com, -*.twitter.com, -*.snssdk.com, -*.pstatp.com
# 禁用列表中可以保留一些極其頑固、甚至連連接都不想讓 Surge 碰的域名
hostname-disabled = %INSERT% gateway.icloud.com, gateway.icloud.com.cn, weather-data.apple.com, buy.itunes.apple.com
# 以下是CA證書
ca-passphrase = 17CD519E
ca-p12 = 
